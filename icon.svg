<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark card background -->
  <rect width="512" height="512" rx="88" fill="#252525"/>
  <!-- Subtle gloss -->
  <rect width="512" height="260" rx="88" fill="url(#gloss)" opacity="0.06"/>
  <defs>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Red pip - top left -->
  <circle cx="148" cy="148" r="88" fill="#CC2020"/>
  <circle cx="148" cy="148" r="72" fill="#CC2020" opacity="0.5"/>
  <circle cx="148" cy="148" r="88" fill="#CC2020"/>

  <!-- Blue pip - top right -->
  <circle cx="364" cy="148" r="88" fill="#1555BB"/>

  <!-- Green pip - bottom left -->
  <circle cx="148" cy="364" r="88" fill="#1A7A30"/>

  <!-- Yellow pip - bottom right -->
  <circle cx="364" cy="364" r="88" fill="#D4900A"/>

  <!-- Subtle inner shadow on pips for depth -->
  <circle cx="148" cy="148" r="88" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="4"/>
  <circle cx="364" cy="148" r="88" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="4"/>
  <circle cx="148" cy="364" r="88" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="4"/>
  <circle cx="364" cy="364" r="88" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="4"/>
</svg>
