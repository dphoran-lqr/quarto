<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3A2208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Quarto" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Quarto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { background: #2A1205; }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50%       { opacity: 0.75; transform: scale(1.15); }
    }
    button:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── 16 pieces: 4 binary attributes ──────────────────────────────────────
    const ALL_PIECES = Array.from({ length: 16 }, (_, i) => ({
      id: i, tall: !!(i&8), light: !!(i&4), square: !!(i&2), hollow: !!(i&1),
    }));

    // ── Win detection ────────────────────────────────────────────────────────
    const WIN_LINES = [
      [[0,0],[0,1],[0,2],[0,3]], [[1,0],[1,1],[1,2],[1,3]],
      [[2,0],[2,1],[2,2],[2,3]], [[3,0],[3,1],[3,2],[3,3]],
      [[0,0],[1,0],[2,0],[3,0]], [[0,1],[1,1],[2,1],[3,1]],
      [[0,2],[1,2],[2,2],[3,2]], [[0,3],[1,3],[2,3],[3,3]],
      [[0,0],[1,1],[2,2],[3,3]], [[0,3],[1,2],[2,1],[3,0]],
    ];
    const sharesAttr = (pieces) => {
      if (pieces.some(p => !p)) return false;
      return ['tall','light','square','hollow'].some(
        a => pieces.every(p => p[a]) || pieces.every(p => !p[a])
      );
    };
    const checkWin = (board) => {
      for (const line of WIN_LINES)
        if (sharesAttr(line.map(([r,c]) => board[r][c]))) return line;
      return null;
    };

    // ── Colours ──────────────────────────────────────────────────────────────
    const BG      = 'radial-gradient(ellipse at 40% 30%, #F5EFE3 0%, #EDE3D0 55%, #E2D5BE 100%)';
    const BOARD   = 'linear-gradient(150deg, #4A2E0A 0%, #3A2208 45%, #4A2E0A 100%)';
    const AMBER   = '#B07830';
    const AMBER_L = '#D4A050';
    const INK     = '#6B4F32';
    const INK_L   = '#9E7D5A';
    const CELL    = '#C8A878';
    const CELL_WIN= 'rgba(176,120,48,0.38)';

    // ── Piece renderer ───────────────────────────────────────────────────────
    function Piece({ piece, size, muted }) {
      const { tall, light, square, hollow } = piece;
      const dim  = tall ? size * 0.80 : size * 0.50;
      const cx   = size / 2;
      const fill = light ? '#EDD9A3' : '#3A2010';
      const edge = light ? '#C4A35A' : '#1E0E04';
      const sw   = hollow ? Math.max(dim * 0.165, 2.5) : (light ? 1.5 : 0.5);
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}
          style={{ opacity: muted ? 0.2 : 1, display: 'block', flexShrink: 0 }}>
          {square
            ? <rect x={cx-dim/2} y={cx-dim/2} width={dim} height={dim} rx={dim*0.09}
                fill={hollow?'transparent':fill} stroke={hollow?fill:edge} strokeWidth={sw} />
            : <circle cx={cx} cy={cx} r={dim/2}
                fill={hollow?'transparent':fill} stroke={hollow?fill:edge} strokeWidth={sw} />
          }
        </svg>
      );
    }

    const label = ({tall,light,square,hollow}) =>
      [tall?'Tall':'Short', light?'Light':'Dark',
       square?'Square':'Round', hollow?'Hollow':'Solid'].join(' · ');

    // ── Slam sound ───────────────────────────────────────────────────────────
    function playSlam() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const go = (type, f0, f1, g0, dur) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = type;
        o.frequency.setValueAtTime(f0, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(f1, ctx.currentTime + dur);
        g.gain.setValueAtTime(g0, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        o.start(); o.stop(ctx.currentTime + dur);
      };
      go('sine',     140, 35, 1.0, 0.22);
      go('triangle',  80, 20, 0.7, 0.25);
      const n = ctx.sampleRate * 0.08 | 0;
      const buf = ctx.createBuffer(1, n, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0; i<n; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/n, 3);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=400;
      const g = ctx.createGain();
      g.gain.setValueAtTime(1.4, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      src.connect(f); f.connect(g); g.connect(ctx.destination);
      src.start(); src.stop(ctx.currentTime + 0.08);
    }

    // ── Initial state ────────────────────────────────────────────────────────
    const init = () => ({
      board:    Array(4).fill(null).map(() => Array(4).fill(null)),
      avail:    [...ALL_PIECES],
      active:   null,
      selected: null,
      phase:    'select',
      player:   1,
      winLine:  null,
      winner:   null,
      draw:     false,
    });

    // ── App ──────────────────────────────────────────────────────────────────
    function QuartoGame() {
      const [gs, setGs] = useState(init);
      const [cell, setCell] = useState(80);

      // Responsive sizing
      useEffect(() => {
        const calc = () => {
          const c = Math.floor(Math.min(
            (window.innerHeight - 60) / 4.4,
            (window.innerWidth  - 96) / 8.4
          ));
          setCell(Math.max(60, c));
        };
        calc();
        window.addEventListener('resize', calc);
        return () => window.removeEventListener('resize', calc);
      }, []);

      const { board, avail, active, selected, phase, player, winLine, winner, draw } = gs;
      const over     = !!(winLine || draw);
      const placed   = new Set(board.flatMap(r => r.filter(Boolean).map(p => p.id)));
      const isAvail  = p => avail.some(a => a.id === p.id);
      const isWin    = (r,c) => winLine?.some(([wr,wc]) => wr===r && wc===c);

      // Derived sizes
      const leftW    = Math.round(cell * 2.15);
      const rightW   = Math.round(cell * 1.95);
      const trayPx   = Math.round(cell * 0.42);
      const mainPx   = Math.round(cell * 0.68);
      const activePx = Math.round(cell * 0.72);
      const trayPiece= Math.round(cell * 0.33);

      const pick = (piece) => {
        if (phase !== 'select' || over || !isAvail(piece)) return;
        setGs(g => ({...g, selected: g.selected?.id===piece.id ? null : piece}));
      };

      const give = () => {
        if (!selected) return;
        playSlam();
        setGs(g => ({...g,
          avail:    g.avail.filter(p => p.id !== g.selected.id),
          active:   g.selected,
          selected: null,
          phase:    'place',
          player:   g.player===1 ? 2 : 1,
        }));
      };

      const place = (r,c) => {
        if (phase!=='place' || over || !active || board[r][c]) return;
        const nb = board.map(row=>[...row]);
        nb[r][c] = active;
        const win = checkWin(nb);
        if (win) { setGs(g=>({...g, board:nb, active:null, winLine:win, winner:g.player})); return; }
        if (avail.length===0) { setGs(g=>({...g, board:nb, active:null, draw:true})); return; }
        setGs(g=>({...g, board:nb, active:null, phase:'select'}));
      };

      const reset = () => setGs(init());

      return (
        <div style={{minHeight:'100vh', background:BG, display:'flex',
          alignItems:'center', justifyContent:'center',
          fontFamily:"'Georgia','Times New Roman',serif",
          padding:'12px', boxSizing:'border-box', overflow:'hidden'}}>

          {/* linen texture */}
          <div style={{position:'absolute',inset:0,pointerEvents:'none',opacity:0.5,
            backgroundImage:`repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(180,150,100,0.04) 3px,rgba(180,150,100,0.04) 4px),
              repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(180,150,100,0.03) 3px,rgba(180,150,100,0.03) 4px)`}} />

          <div style={{display:'flex', gap:'16px', alignItems:'center',
            justifyContent:'center', width:'100%', position:'relative', zIndex:1}}>

            {/* ── LEFT PANEL ──────────────────────────────────────────────── */}
            <div style={{width:leftW, flexShrink:0, display:'flex',
              flexDirection:'column', gap:'12px'}}>

              <div>
                <h1 style={{margin:0, fontSize:'28px', letterSpacing:'6px',
                  color:AMBER, fontWeight:700,
                  textShadow:'0 1px 0 rgba(255,255,255,0.8)'}}>QUARTO</h1>
                <p style={{margin:'2px 0 0', color:INK_L, fontSize:'8px',
                  letterSpacing:'2px', textTransform:'uppercase'}}>Abstract Strategy</p>
              </div>

              {!over ? (
                <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                  <div style={{padding:'6px 12px', borderRadius:'5px', display:'inline-block',
                    background: player===1
                      ? 'linear-gradient(135deg,#C8A878,#B09060)'
                      : 'linear-gradient(135deg,#8C6840,#705030)',
                    color:'#FFF8EE', fontSize:'11px', letterSpacing:'2px',
                    textTransform:'uppercase', fontWeight:'bold',
                    boxShadow:'0 2px 6px rgba(100,70,30,0.2)'}}>
                    Player {player}
                  </div>
                  <p style={{margin:0, color:INK, fontSize:'12px', lineHeight:1.6}}>
                    {phase==='select'
                      ? <span>Tap a piece to give<br/>to your opponent.</span>
                      : <span>Place the piece<br/>on the board.</span>}
                  </p>
                </div>
              ) : (
                <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                  <p style={{margin:0, color:AMBER, fontSize:'20px',
                    fontWeight:'bold', lineHeight:1.3}}>
                    {draw ? 'Draw!' : `Player ${winner} Wins!`}
                  </p>
                  <button onClick={reset} style={{background:'transparent',
                    border:`1.5px solid ${AMBER}`, color:AMBER,
                    padding:'8px 12px', borderRadius:'5px', cursor:'pointer',
                    fontSize:'11px', letterSpacing:'1.5px',
                    fontFamily:'Georgia,serif', textTransform:'uppercase'}}>
                    New Game
                  </button>
                </div>
              )}

              {/* Piece to place */}
              {active && phase==='place' && (
                <div style={{display:'flex', flexDirection:'column',
                  alignItems:'center', gap:'6px', padding:'10px 8px',
                  borderRadius:'8px', background:'rgba(255,255,255,0.6)',
                  border:`1px solid ${AMBER}55`}}>
                  <p style={{margin:0, color:AMBER, fontSize:'8px',
                    letterSpacing:'2px', textTransform:'uppercase'}}>Must Place</p>
                  <Piece piece={active} size={activePx} />
                  <p style={{margin:0, color:INK_L, fontSize:'8px',
                    textAlign:'center', lineHeight:1.4}}>{label(active)}</p>
                </div>
              )}

              {/* Selected piece + confirm */}
              {phase==='select' && selected && !over && (
                <div style={{display:'flex', flexDirection:'column', gap:'6px'}}>
                  <div style={{display:'flex', flexDirection:'column',
                    alignItems:'center', gap:'4px', padding:'8px',
                    borderRadius:'6px', background:'rgba(255,255,255,0.6)',
                    border:`1px dashed ${AMBER}66`}}>
                    <Piece piece={selected} size={activePx} />
                    <p style={{margin:0, color:INK_L, fontSize:'8px', textAlign:'center'}}>
                      {label(selected)}
                    </p>
                  </div>
                  <button onClick={give} style={{
                    background:`linear-gradient(135deg,${AMBER_L},${AMBER})`,
                    color:'#FFF8EE', border:'none', padding:'10px 0',
                    borderRadius:'6px', cursor:'pointer', fontSize:'11px',
                    fontWeight:'bold', fontFamily:'Georgia,serif', width:'100%',
                    boxShadow:'0 3px 10px rgba(176,120,48,0.3)'}}>
                    Give to Opponent →
                  </button>
                </div>
              )}

              {/* Attribute key */}
              <div style={{marginTop:'auto', paddingTop:'8px',
                borderTop:'1px solid rgba(140,110,70,0.2)'}}>
                <p style={{margin:'0 0 4px', color:INK_L, fontSize:'8px',
                  letterSpacing:'1.5px', textTransform:'uppercase'}}>Attributes</p>
                {[['Size','Tall · Short'],['Color','Light · Dark'],
                  ['Shape','Square · Round'],['Fill','Hollow · Solid']].map(([k,v])=>(
                  <div key={k} style={{display:'flex', justifyContent:'space-between', marginBottom:'2px'}}>
                    <span style={{color:INK_L, fontSize:'8px'}}>{k}</span>
                    <span style={{color:AMBER, fontSize:'8px'}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* ── BOARD ───────────────────────────────────────────────────── */}
            <div style={{flexShrink:0}}>
              <div style={{
                display:'grid',
                gridTemplateColumns:`repeat(4,${cell}px)`,
                gridTemplateRows:`repeat(4,${cell}px)`,
                gap:'4px', padding:'12px',
                background:BOARD, borderRadius:'10px',
                border:'2px solid #2A1404',
                boxShadow:'0 8px 32px rgba(100,70,30,0.25),inset 0 1px 0 rgba(255,255,255,0.08)'}}>
                {board.map((row,r) => row.map((cell_,c) => {
                  const win_    = isWin(r,c);
                  const canDrop = phase==='place' && !cell_ && !over && active;
                  return (
                    <div key={`${r}-${c}`} onClick={()=>place(r,c)}
                      style={{width:cell, height:cell, borderRadius:'5px',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        background: win_ ? CELL_WIN : CELL,
                        border:`1px solid ${win_?'#B0783088':'rgba(140,110,70,0.2)'}`,
                        cursor: canDrop?'pointer':'default',
                        boxShadow: win_
                          ? 'inset 0 0 16px rgba(176,120,48,0.3)'
                          : 'inset 0 1px 0 rgba(255,255,255,0.4)',
                        transition:'background 0.18s'}}>
                      {cell_ && <Piece piece={cell_} size={mainPx} />}
                      {!cell_ && canDrop && (
                        <div style={{width:Math.round(cell*0.28), height:Math.round(cell*0.28),
                          borderRadius:'50%', border:'2px dashed rgba(176,120,48,0.4)',
                          animation:'pulse 1.8s ease-in-out infinite'}} />
                      )}
                    </div>
                  );
                }))}
              </div>
            </div>

            {/* ── PIECE TRAY ──────────────────────────────────────────────── */}
            <div style={{width:rightW, flexShrink:0,
              display:'flex', flexDirection:'column', gap:'8px'}}>
              <p style={{margin:0, color:INK_L, fontSize:'8px',
                letterSpacing:'2px', textTransform:'uppercase'}}>
                {avail.length} of 16 left
              </p>
              <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'4px'}}>
                {ALL_PIECES.map(p => {
                  const avl = isAvail(p);
                  const used = placed.has(p.id) || active?.id===p.id;
                  const sel  = selected?.id===p.id;
                  const can  = avl && phase==='select' && !over;
                  return (
                    <div key={p.id} onClick={()=>can&&pick(p)} title={label(p)}
                      style={{width:trayPx, height:trayPx, borderRadius:'5px',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        position:'relative',
                        background: sel?'rgba(176,120,48,0.15)':'rgba(255,255,255,0.5)',
                        border:`1.5px solid ${sel?AMBER:'rgba(140,110,70,0.2)'}`,
                        cursor: can?'pointer':'default',
                        transform: sel?'scale(1.1)':'scale(1)',
                        transition:'all 0.12s',
                        boxShadow: sel?`0 0 8px rgba(176,120,48,0.35)`:'0 1px 2px rgba(100,70,30,0.08)'}}>
                      <Piece piece={p} size={trayPiece} muted={used} />
                      {used && (
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none"
                          style={{position:'absolute', inset:3,
                            width:'calc(100% - 6px)', height:'calc(100% - 6px)',
                            pointerEvents:'none'}}>
                          <line x1="5" y1="5" x2="95" y2="95"
                            stroke="rgba(180,30,30,0.8)" strokeWidth="12" strokeLinecap="round"/>
                          <line x1="95" y1="5" x2="5" y2="95"
                            stroke="rgba(180,30,30,0.8)" strokeWidth="12" strokeLinecap="round"/>
                        </svg>
                      )}
                    </div>
                  );
                })}
              </div>
              <p style={{margin:'8px 0 0', color:INK_L, fontSize:'8px', lineHeight:1.5}}>
                4 in a row, col, or diagonal sharing any attribute wins.
              </p>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<QuartoGame />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
